<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/signup.css">
</head>
<body>

  <div class="card">
    <h1>Create Account</h1>

    <div id="error-banner" class="error-banner" style="display:none;"></div>

    <form id="signup-form">

      <div class="input-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name" autocomplete="name">
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create password" autocomplete="new-password">
        <div class="password-hint">Min 8 characters, include a number &amp; symbol</div>
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter password" autocomplete="new-password">
      </div>

      <div class="input-group">
        <label for="userType">Account Type</label>
        <select id="userType">
          <option value="free">Free</option>
          <option value="premium">Premium</option>
        </select>
      </div>

      <button class="btn" id="submit-btn" type="button" onclick="signup()">Sign Up</button>

    </form>

    <div class="footer-text">
      Already have an account? <a href="/login">Login</a>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Welcome 🎉</h2>
      <p>Account created successfully!</p>
      <button class="close-btn" onclick="goToLogin()">Go to Login</button>
    </div>
  </div>

  <script src="/static/js/signup.js"></script>

</body>
</html>
